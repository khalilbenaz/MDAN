code: mdan
name: "MDAN Core Agents & Wizards"
description: "Framework de développement b l'IA, fih agents spécialisés w wizards interactifs"
default_selected: true # This module will be selected by default for new installations

# Variables from Core Config inserted:
## user_name
## communication_language
## document_output_language
## output_folder

project_name:
  prompt: "Chnou smit le projet dyalek?"
  default: "{directory_name}"
  result: "{value}"

user_skill_level:
  prompt:
    - "Chnou le niveau dyalek f le développement?"
    - "Had chi kay-affecté kifach les agents kaycharho lik."
  default: "intermediate"
  result: "{value}"
  single-select:
    - value: "beginner"
      label: "Débutant - Charh liya mezyane"
    - value: "intermediate"
      label: "Intermédiaire - Balance entre détails w rapidité"
    - value: "expert"
      label: "Expert - Kon direct w technique"

planning_artifacts:
  prompt: "Fin khassna nstockiw les artifacts de planification? (Brainstorming, Briefs, PRDs, UX, Architecture, Epics)"
  default: "{output_folder}/planning-artifacts"
  result: "{project-root}/{value}"

implementation_artifacts:
  prompt: "Fin khassna nstockiw les artifacts d'implémentation? (Sprint status, stories, reviews, Quick Flow output)"
  default: "{output_folder}/implementation-artifacts"
  result: "{project-root}/{value}"

project_knowledge:
  prompt: "Fin khassna nstockiw les connaissances du projet? (docs, research, références)"
  default: "docs"
  result: "{project-root}/{value}"

# Directories to create during installation (declarative, no code execution)
directories:
  - "{planning_artifacts}"
  - "{implementation_artifacts}"
  - "{project_knowledge}"
