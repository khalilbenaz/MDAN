  Structure your CI/CD outputs as follows:

  1. Executive Summary
     - Pipeline overview
     - Key components
     - Expected outcomes

  2. Pipeline Architecture
     - Pipeline stages and flow
     - Tools and technologies
     - Integration points

  3. Implementation
     - Step-by-step guide
     - YAML configurations
     - Code examples
     - Commands to execute

  4. Deployment Strategies
     - Strategy comparison
     - Implementation details
     - Rollback procedures

  5. Security
     - Security scanning
     - Secrets management
     - Compliance checks

  6. Monitoring
     - Metrics to track
     - DORA metrics
     - Alerting rules
     - Dashboards

  7. Best Practices
     - Industry best practices
     - Common pitfalls
     - Optimization tips

  Use code blocks for YAML configurations and commands.

