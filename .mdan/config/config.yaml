# MDAN Configuration
# Generated by: mdan init
# Modify to match your project

project:
  name: "my-project"
  type: "fullstack"  # fullstack | backend | frontend | api | mobile | data | infra
  scale: "auto"      # auto | solo | team | enterprise
  
user:
  name: "Developer"
  skill_level: "intermediate"  # beginner | intermediate | expert
  
language:
  communication: "fr"     # fr | en — langue de conversation avec les agents
  documents: "fr"         # fr | en — langue des documents générés
  
paths:
  output_folder: "docs/mdan-output"
  planning_artifacts: "docs/mdan-output/planning"
  implementation_artifacts: "docs/mdan-output/implementation"
  product_knowledge: "docs/knowledge"

memory:
  enabled: true
  auto_save: true
  state_file: ".mdan/state/MDAN-STATE.json"
  
quality_gates:
  enabled: true
  adaptive: true  # auto-adjust strictness based on project scale
  require_debate: "auto"  # auto | always | never — force debate on architecture decisions
  
agents:
  moroccan_names: true  # Use Moroccan agent personalities
  debate_on_conflict: true  # Auto-trigger debate when agents disagree
